<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業者配置図</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050d1a;--panel:#0a1a30;--border:#0e2a4a;
  --cyan:#00d4ff;--gold:#f5c842;--green:#00e676;--amber:#ffab00;--red:#ff4444;--blue:#4488ff;
  --text:#d0e8f8;--muted:#4a6a8a;
  --mono:'Share Tech Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 20% 30%,rgba(0,100,200,0.12) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,180,255,0.03) 3px,rgba(0,180,255,0.03) 4px);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 16px 60px;}

/* ヘッダー */
header{padding:20px 0 0;border-bottom:1px solid var(--border);margin-bottom:20px;}
.header-inner{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:14px;flex-wrap:wrap;gap:10px;}
.back-btn{font-family:var(--mono);font-size:11px;color:var(--cyan);border:1px solid var(--cyan);background:transparent;padding:5px 12px;border-radius:4px;cursor:pointer;text-decoration:none;letter-spacing:1px;transition:all .2s;}
.back-btn:hover{background:rgba(0,212,255,.1);}
.page-title{font-family:var(--mono);font-size:clamp(16px,3vw,24px);color:var(--gold);letter-spacing:3px;}
.clock-time{font-family:var(--mono);font-size:20px;color:var(--cyan);letter-spacing:2px;}
.clock-date{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:right;}

/* 日付・シフト共通バー */
.top-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.date-btn{font-family:var(--mono);font-size:16px;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:4px;width:28px;height:28px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.date-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.date-display{font-family:var(--mono);font-size:13px;color:var(--gold);letter-spacing:2px;}
.shift-tabs{display:flex;gap:6px;}
.shift-tab{font-family:var(--mono);font-size:11px;padding:5px 14px;border:1px solid var(--border);border-radius:4px;background:var(--panel);color:var(--muted);cursor:pointer;transition:all .2s;}
.shift-tab.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08);}
.tb-btn{font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:5px 12px;border-radius:4px;cursor:pointer;border:1px solid;transition:all .2s;}
.tb-edit{border-color:var(--amber);color:var(--amber);background:rgba(255,171,0,.08);}
.tb-edit:hover,.tb-edit.active{background:rgba(255,171,0,.2);box-shadow:0 0 8px rgba(255,171,0,.3);}
.tb-save{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08);}
.tb-save:hover{background:rgba(0,230,118,.2);}
.tb-cyan{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08);}
.tb-cyan:hover{background:rgba(0,212,255,.2);}
.tb-blue{border-color:var(--blue);color:var(--blue);background:rgba(68,136,255,.08);}
.tb-blue:hover{background:rgba(68,136,255,.2);}

/* メインタブ（対応表 / 配置図） */
.main-tabs{display:flex;gap:4px;margin-bottom:0;}
.main-tab{font-family:var(--mono);font-size:12px;letter-spacing:1px;padding:7px 20px;background:var(--panel);border:1px solid var(--border);border-bottom:none;border-radius:4px 4px 0 0;color:var(--muted);cursor:pointer;transition:all .2s;}
.main-tab.active{background:#081e3a;color:var(--gold);border-color:var(--gold);}
.main-content{display:none;background:#081e3a;border:1px solid var(--gold);border-radius:0 4px 4px 4px;padding:16px;}
.main-content.active{display:block;}

/* 統計 */
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 14px;text-align:center;min-width:80px;}
.stat-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--green);}
.stat-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:1px;}

/* 配置テーブル */
.layout-table-wrap{overflow-x:auto;}
table.layout-table{border-collapse:collapse;width:100%;min-width:500px;}
table.layout-table th{background:#0d2040;color:var(--cyan);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:7px 10px;border:1px solid var(--border);text-align:center;white-space:nowrap;}
table.layout-table td{border:1px solid var(--border);padding:0;vertical-align:middle;}
.cell-inner{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;gap:6px;min-height:42px;}
.cell-proc{font-family:var(--mono);font-size:11px;color:var(--cyan);min-width:44px;}
.cell-name{font-size:13px;color:var(--text);font-weight:500;flex:1;text-align:center;}
.cell-name.empty{color:var(--muted);font-size:11px;}
.cell-note{font-size:10px;color:var(--amber);}
.cell-edit-btn{font-size:11px;opacity:0;cursor:pointer;transition:opacity .2s;background:transparent;border:none;color:var(--amber);}
.cell-inner:hover .cell-edit-btn{opacity:1;}
tr:nth-child(even) td{background:rgba(255,255,255,.015);}
.group-label{font-family:var(--mono);font-size:9px;color:var(--gold);padding:4px 10px;background:#061220;border-bottom:1px solid var(--border);letter-spacing:2px;}

/* ── 配置図（画像・PDF）エリア ── */
.fig-layout{display:grid;grid-template-columns:260px 1fr;gap:14px;}
.fig-list-panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.fig-list-title{font-family:var(--mono);font-size:10px;color:var(--cyan);letter-spacing:2px;padding:9px 12px;background:#061220;border-bottom:1px solid var(--border);}
.fig-list{padding:6px;}
.fig-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:4px;cursor:pointer;transition:background .2s;margin-bottom:3px;}
.fig-item:hover{background:rgba(0,212,255,.06);}
.fig-item.active{background:rgba(0,212,255,.1);border-left:2px solid var(--cyan);}
.fig-icon{font-size:17px;flex-shrink:0;}
.fig-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fig-date{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px;}
.fig-empty{font-family:var(--mono);font-size:10px;color:var(--muted);padding:18px;text-align:center;line-height:2.2;}
.fig-upload-zone{border:2px dashed var(--border);border-radius:6px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;margin:6px;}
.fig-upload-zone:hover,.fig-upload-zone.drag{border-color:var(--cyan);background:rgba(0,212,255,.04);}
.fig-upload-zone input{display:none;}
.fig-upload-label{font-family:var(--mono);font-size:10px;color:var(--muted);line-height:2;cursor:pointer;}
.fig-upload-label span{color:var(--cyan);}
.fig-preview-panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;}
.fig-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#061220;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.fig-fname{font-family:var(--mono);font-size:11px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fig-body{flex:1;min-height:460px;display:flex;align-items:center;justify-content:center;padding:8px;}
.fig-body iframe{width:100%;height:520px;border:none;}
.fig-body img{max-width:100%;max-height:520px;object-fit:contain;border-radius:4px;}
.fig-no-file{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;line-height:2.5;}

/* 編集モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:#081428;border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:8px;padding:22px 26px;width:min(400px,92vw);}
.modal-title{font-family:var(--mono);font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:14px;}
.modal-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.modal-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;}
.modal-input{background:#0a1a30;border:1px solid var(--border);border-radius:4px;padding:7px 10px;color:var(--text);font-family:var(--sans);font-size:14px;width:100%;}
.modal-input:focus{outline:none;border-color:var(--gold);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.m-btn{font-family:var(--mono);font-size:11px;letter-spacing:1px;padding:6px 16px;border-radius:4px;cursor:pointer;border:1px solid;transition:all .2s;}
.m-ok{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.1);}
.m-ok:hover{background:rgba(0,230,118,.25);}
.m-cancel{border-color:var(--border);color:var(--muted);background:transparent;}
.m-cancel:hover{border-color:var(--text);color:var(--text);}
.m-del{border-color:var(--red);color:var(--red);background:rgba(255,68,68,.08);}
.m-del:hover{background:rgba(255,68,68,.2);}

@media print{
  body{background:#fff;color:#000;}
  body::before,body::after{display:none;}
  .top-bar,.main-tabs,.stats-bar,.cell-edit-btn,.back-btn,.tb-btn,.shift-tabs{display:none!important;}
  .main-content{display:block!important;border:none;padding:0;}
  table.layout-table th{background:#e8f0fe;color:#000;}
  table.layout-table td,table.layout-table th{border:1px solid #ccc;}
  .cell-name{color:#000;}.cell-proc{color:#1a6b9a;}.group-label{background:#f5f5f5;color:#555;}
}
@media(max-width:700px){
  .fig-layout{grid-template-columns:1fr;}
  .fig-body iframe,.fig-body img{height:360px;max-height:360px;}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-inner">
      <div style="display:flex;align-items:center;gap:14px;">
        <a class="back-btn" href="index.html">← ホーム</a>
        <div class="page-title">作業者配置図</div>
      </div>
      <div>
        <div class="clock-time" id="clk">--:--:--</div>
        <div class="clock-date" id="clkd">----年--月--日</div>
      </div>
    </div>
  </header>

  <!-- 日付・シフト・共通ツール -->
  <div class="top-bar">
    <button class="date-btn" onclick="changeDate(-1)">‹</button>
    <span class="date-display" id="dateDisplay">----年--月--日</span>
    <button class="date-btn" onclick="changeDate(1)">›</button>
    <button class="tb-btn tb-cyan" style="font-size:9px;padding:4px 10px;" onclick="goToday()">今日</button>
    <div class="shift-tabs">
      <div class="shift-tab active" onclick="setShift('day',this)">日勤</div>
      <div class="shift-tab" onclick="setShift('night',this)">夜勤</div>
    </div>
    <button class="tb-btn tb-save" onclick="saveData()">💾 保存</button>
    <button class="tb-btn tb-blue" onclick="window.print()">🖨 印刷</button>
  </div>

  <!-- メインタブ -->
  <div class="main-tabs">
    <div class="main-tab active" onclick="switchMainTab('table',this)">📋 工程対応表</div>
    <div class="main-tab" onclick="switchMainTab('figure',this)">🗺 配置図（画像・PDF）</div>
  </div>

  <!-- タブ①：工程対応表 -->
  <div class="main-content active" id="tab-table">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
      <button class="tb-btn tb-edit" id="editToggle" onclick="toggleEdit()">✏ 編集モード</button>
      <button class="tb-btn tb-cyan" onclick="addProcess()">＋ 工程追加</button>
      <span id="editStatus" style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;">閲覧モード</span>
    </div>
    <div class="stats-bar" id="statsBar"></div>
    <div class="layout-table-wrap">
      <table class="layout-table" id="layoutTable"></table>
    </div>
  </div>

  <!-- タブ②：配置図（画像・PDF） -->
  <div class="main-content" id="tab-figure">
    <div class="fig-layout">
      <!-- 左：ファイルリスト -->
      <div>
        <div class="fig-list-panel">
          <div class="fig-list-title">■ 配置図ファイル</div>
          <div class="fig-list" id="figList">
            <div class="fig-empty">配置図がありません<br>下からアップロード</div>
          </div>
          <div class="fig-upload-zone" id="figUploadZone">
            <input type="file" id="figFileInput" accept=".pdf,.png,.jpg,.jpeg" multiple onchange="handleFigFiles(this.files)">
            <label class="fig-upload-label" for="figFileInput">
              <div style="font-size:22px;margin-bottom:5px;">📎</div>
              <span>クリックまたはドロップ</span><br>
              PDF / 画像（PNG・JPG）
            </label>
          </div>
        </div>
      </div>
      <!-- 右：プレビュー -->
      <div class="fig-preview-panel">
        <div class="fig-toolbar">
          <span class="fig-fname" id="figPreviewName">ファイルを選択してください</span>
          <button class="tb-btn tb-blue" id="figDlBtn" style="display:none;font-size:9px;padding:3px 10px;" onclick="downloadFig()">↓ DL</button>
          <button class="tb-btn m-del" id="figDelBtn" style="display:none;font-size:9px;padding:3px 10px;border-color:var(--red);color:var(--red);" onclick="deleteFig()">削除</button>
        </div>
        <div class="fig-body" id="figBody">
          <div class="fig-no-file">左のリストからファイルを選択<br>または新しいファイルをアップロード</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">作業者を編集</div>
    <div class="modal-row"><div class="modal-label">工程番号</div><input class="modal-input" id="modalProc" type="text" readonly style="color:var(--cyan)"></div>
    <div class="modal-row"><div class="modal-label">作業者名</div><input class="modal-input" id="modalName" type="text" placeholder="氏名を入力"></div>
    <div class="modal-row"><div class="modal-label">備考</div><input class="modal-input" id="modalNote" type="text" placeholder="応援・教育など（任意）"></div>
    <div class="modal-btns">
      <button class="m-btn m-del" onclick="clearCell()">クリア</button>
      <button class="m-btn m-cancel" onclick="closeModal()">キャンセル</button>
      <button class="m-btn m-ok" onclick="saveCell()">✔ 保存</button>
    </div>
  </div>
</div>

<script>
/* ════ 工程マスタ ════ */
const PROCESSES = [
  {group:'前工程（1〜100）', procs:[
    {num:'1'},{num:'2'},{num:'3'},{num:'4'},{num:'5'},{num:'6'},{num:'7'},{num:'8'},
    {num:'9'},{num:'10'},{num:'12'},{num:'15'},{num:'20'},{num:'30'},{num:'31'},
    {num:'32'},{num:'35'},{num:'36'},{num:'40'},{num:'50'},{num:'75'},
    {num:'80'},{num:'90'},{num:'95'},{num:'100'},
  ]},
  {group:'後工程（101〜220）', procs:[
    {num:'105'},{num:'110'},{num:'120'},{num:'130'},{num:'140'},
    {num:'142'},{num:'143'},{num:'150'},{num:'151'},{num:'155'},
    {num:'160'},{num:'165'},{num:'170'},{num:'180'},{num:'181'},
    {num:'200'},{num:'202'},{num:'210'},{num:'212'},{num:'220'},
  ]},
  {group:'特殊工程', procs:[
    {num:'C2'},{num:'C99'},{num:'D9'},{num:'AG'},{num:'KC'},
  ]},
];

let currentDate = new Date();
let currentShift = 'day';
let editMode = false;
let modalProcNum = '';
let layoutData  = JSON.parse(localStorage.getItem('layoutData')||'{}');
let figFiles    = JSON.parse(localStorage.getItem('figFiles')||'[]');
let figDataMap  = JSON.parse(localStorage.getItem('figDataMap')||'{}');
let currentFigIdx = -1;

/* ── 時計 ── */
function updateClock(){
  const now=new Date();
  document.getElementById('clk').textContent=now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clkd').textContent=dateLabel(now);
}
setInterval(updateClock,1000); updateClock();

/* ── 日付 ── */
function dateKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n){ return String(n).padStart(2,'0'); }
function dateLabel(d){
  const days=['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${pad(d.getMonth()+1)}月${pad(d.getDate())}日（${days[d.getDay()]}）`;
}
function updateDateDisplay(){ document.getElementById('dateDisplay').textContent=dateLabel(currentDate); }
function changeDate(d){ currentDate.setDate(currentDate.getDate()+d); updateDateDisplay(); renderTable(); renderStats(); }
function goToday(){ currentDate=new Date(); updateDateDisplay(); renderTable(); renderStats(); }
function setShift(s,tab){
  currentShift=s;
  document.querySelectorAll('.shift-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  renderTable(); renderStats();
}

/* ── メインタブ切替 ── */
function switchMainTab(name, btn){
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.main-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

/* ── 編集モード ── */
function toggleEdit(){
  editMode=!editMode;
  const btn=document.getElementById('editToggle');
  btn.classList.toggle('active',editMode);
  document.getElementById('editStatus').textContent=editMode?'編集モード（セルをクリック）':'閲覧モード';
  renderTable();
}

/* ── 保存 ── */
function saveData(){
  localStorage.setItem('layoutData',JSON.stringify(layoutData));
  const btn=document.querySelector('.tb-save');
  btn.textContent='✔ 保存しました';
  setTimeout(()=>btn.textContent='💾 保存',1500);
}

/* ── セル取得・設定 ── */
function getCell(proc){ const k=dateKey(currentDate); return layoutData[k]?.[currentShift]?.[proc]||{name:'',note:''}; }
function setCell(proc,val){
  const k=dateKey(currentDate);
  if(!layoutData[k]) layoutData[k]={};
  if(!layoutData[k][currentShift]) layoutData[k][currentShift]={};
  layoutData[k][currentShift][proc]=val;
}

/* ── テーブル描画 ── */
function renderTable(){
  const tbl=document.getElementById('layoutTable');
  let html=`<thead><tr><th>工程番号</th><th>作業者名</th><th>備考</th></tr></thead><tbody>`;
  PROCESSES.forEach(group=>{
    html+=`<tr><td colspan="3" class="group-label">◆ ${group.group}</td></tr>`;
    group.procs.forEach(p=>{
      const cell=getCell(p.num);
      const has=!!cell.name;
      html+=`<tr>
        <td><div class="cell-inner"><span class="cell-proc">${p.num}</span></div></td>
        <td><div class="cell-inner"${editMode?` onclick="openModal('${p.num}')" style="cursor:pointer"`:''}>
          <span class="cell-name${has?'':' empty'}">${has?cell.name:'（未配置）'}</span>
          ${editMode?`<button class="cell-edit-btn" onclick="openModal('${p.num}')">✏</button>`:''}
        </div></td>
        <td><div class="cell-inner"><span class="cell-note">${cell.note||''}</span></div></td>
      </tr>`;
    });
  });
  html+=`</tbody>`;
  tbl.innerHTML=html;
}

/* ── 統計 ── */
function renderStats(){
  const k=dateKey(currentDate);
  const shift=layoutData[k]?.[currentShift]||{};
  const allP=PROCESSES.flatMap(g=>g.procs);
  const assigned=allP.filter(p=>shift[p.num]?.name).length;
  const names=[...new Set(allP.map(p=>shift[p.num]?.name).filter(Boolean))];
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card"><div class="stat-val">${assigned}</div><div class="stat-lbl">配置済み</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--amber)">${allP.length-assigned}</div><div class="stat-lbl">未配置</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--cyan)">${names.length}</div><div class="stat-lbl">作業者数</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--muted)">${allP.length}</div><div class="stat-lbl">総工程数</div></div>`;
}

/* ── モーダル ── */
function openModal(proc){
  if(!editMode) return;
  modalProcNum=proc;
  const cell=getCell(proc);
  document.getElementById('modalTitle').textContent=`工程 ${proc}　作業者を編集`;
  document.getElementById('modalProc').value=proc;
  document.getElementById('modalName').value=cell.name||'';
  document.getElementById('modalNote').value=cell.note||'';
  document.getElementById('editModal').classList.add('open');
  setTimeout(()=>document.getElementById('modalName').focus(),80);
}
function closeModal(){ document.getElementById('editModal').classList.remove('open'); }
function saveCell(){
  setCell(modalProcNum,{name:document.getElementById('modalName').value.trim(),note:document.getElementById('modalNote').value.trim()});
  saveData(); closeModal(); renderTable(); renderStats();
}
function clearCell(){
  setCell(modalProcNum,{name:'',note:''});
  saveData(); closeModal(); renderTable(); renderStats();
}
function addProcess(){
  const num=prompt('追加する工程番号を入力してください:');
  if(!num||!num.trim()) return;
  const n=num.trim();
  if(PROCESSES.flatMap(g=>g.procs).some(p=>p.num===n)){ alert('その工程番号はすでに存在します'); return; }
  PROCESSES[PROCESSES.length-1].procs.push({num:n});
  renderTable(); renderStats();
}
document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&document.getElementById('editModal').classList.contains('open')) saveCell(); });
document.getElementById('editModal').addEventListener('click',e=>{ if(e.target===document.getElementById('editModal')) closeModal(); });

/* ════ 配置図（画像・PDF）════ */
function saveFigs(){
  localStorage.setItem('figFiles',JSON.stringify(figFiles));
  try{ localStorage.setItem('figDataMap',JSON.stringify(figDataMap)); }catch(e){}
}

function handleFigFiles(fileList){
  Array.from(fileList).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const id='fig_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      const today=new Date().toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'});
      figFiles.unshift({id,name:file.name,date:today,type:file.type});
      figDataMap[id]=e.target.result;
      saveFigs();
      renderFigList();
      selectFig(0);
    };
    reader.readAsDataURL(file);
  });
}

/* ドラッグ&ドロップ */
const fz=document.getElementById('figUploadZone');
fz.addEventListener('dragover',e=>{e.preventDefault();fz.classList.add('drag');});
fz.addEventListener('dragleave',()=>fz.classList.remove('drag'));
fz.addEventListener('drop',e=>{e.preventDefault();fz.classList.remove('drag');handleFigFiles(e.dataTransfer.files);});

function renderFigList(){
  const el=document.getElementById('figList');
  if(figFiles.length===0){
    el.innerHTML='<div class="fig-empty">配置図がありません<br>下からアップロード</div>';
    return;
  }
  el.innerHTML=figFiles.map((f,i)=>{
    const icon=f.name.endsWith('.pdf')?'📄':'🖼️';
    return `<div class="fig-item${i===currentFigIdx?' active':''}" onclick="selectFig(${i})">
      <div class="fig-icon">${icon}</div>
      <div><div class="fig-name">${f.name}</div><div class="fig-date">${f.date}</div></div>
    </div>`;
  }).join('');
}

function selectFig(idx){
  currentFigIdx=idx;
  const f=figFiles[idx];
  const data=figDataMap[f.id];
  document.getElementById('figPreviewName').textContent=f.name;
  document.getElementById('figDlBtn').style.display='';
  document.getElementById('figDelBtn').style.display='';
  const body=document.getElementById('figBody');
  if(f.name.endsWith('.pdf')){
    body.innerHTML=`<iframe src="${data}"></iframe>`;
  } else {
    body.innerHTML=`<img src="${data}" alt="${f.name}">`;
  }
  renderFigList();
}

function downloadFig(){
  if(currentFigIdx<0) return;
  const f=figFiles[currentFigIdx];
  const a=document.createElement('a');
  a.href=figDataMap[f.id]; a.download=f.name; a.click();
}

function deleteFig(){
  if(currentFigIdx<0||!confirm(`「${figFiles[currentFigIdx].name}」を削除しますか？`)) return;
  delete figDataMap[figFiles[currentFigIdx].id];
  figFiles.splice(currentFigIdx,1);
  currentFigIdx=-1;
  saveFigs();
  document.getElementById('figPreviewName').textContent='ファイルを選択してください';
  document.getElementById('figDlBtn').style.display='none';
  document.getElementById('figDelBtn').style.display='none';
  document.getElementById('figBody').innerHTML='<div class="fig-no-file">左のリストからファイルを選択<br>または新しいファイルをアップロード</div>';
  renderFigList();
}

/* ── 初期化 ── */
updateDateDisplay();
renderTable();
renderStats();
renderFigList();
if(figFiles.length>0) selectFig(0);
</script>
</body>
</html>
