<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">製造課　ホームページ（サンプル）</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050d1a;--bg2:#081428;--panel:#0a1a30;--border:#0e2a4a;
  --accent:#00d4ff;--accent2:#0088bb;
  --title-color:#f5c842;--title-color2:#c8961a;
  --green:#00e676;--amber:#ffab00;--red:#ff4444;--blue:#4488ff;
  --text:#d0e8f8;--muted:#4a6a8a;
  --mono:'Share Tech Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 20% 30%,rgba(0,100,200,0.12) 0%,transparent 70%),radial-gradient(ellipse 400px 300px at 80% 70%,rgba(0,180,255,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,180,255,0.03) 3px,rgba(0,180,255,0.03) 4px);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 16px 60px;}
header{padding:24px 0 0;border-bottom:1px solid var(--border);margin-bottom:28px;}
.header-inner{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:16px;flex-wrap:wrap;gap:12px;}
.site-title{font-family:var(--mono);font-size:clamp(18px,4vw,30px);color:var(--title-color);letter-spacing:4px;text-shadow:0 0 20px rgba(245,200,66,0.4);line-height:1.2;}
.site-sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-top:4px;font-family:var(--mono);}
.clock-time{font-family:var(--mono);font-size:clamp(20px,3vw,28px);color:var(--accent);letter-spacing:3px;text-shadow:0 0 10px rgba(0,212,255,0.4);}
.clock-date{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px;text-align:right;}
.section-title{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:3px;border-left:3px solid var(--accent);padding-left:10px;margin-bottom:14px;opacity:0.8;}
.featured-card{background:linear-gradient(135deg,#081e3a 0%,#0a1428 100%);border:1px solid var(--accent2);border-top:3px solid var(--accent);border-radius:8px;padding:20px 24px;margin-bottom:28px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s;text-decoration:none;color:inherit;}
.featured-card:hover{border-color:var(--accent);box-shadow:0 0 24px rgba(0,212,255,0.15);}
.featured-badge{font-family:var(--mono);font-size:9px;color:var(--accent);border:1px solid var(--accent);padding:2px 8px;border-radius:2px;letter-spacing:2px;display:inline-block;margin-bottom:8px;}
.featured-title{font-size:clamp(16px,3vw,22px);font-weight:700;color:#fff;letter-spacing:1px;margin-bottom:6px;}
.featured-desc{font-size:12px;color:var(--muted);line-height:1.7;}
.featured-stats{display:flex;gap:16px;flex-wrap:wrap;}
.fstat{text-align:center;background:rgba(0,212,255,0.06);border:1px solid var(--border);border-radius:6px;padding:10px 16px;min-width:80px;}
.fstat-val{font-family:var(--mono);font-size:22px;color:var(--green);font-weight:700;}
.fstat-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.featured-arrow{font-size:28px;color:var(--accent);opacity:0.6;transition:opacity 0.2s,transform 0.2s;}
.featured-card:hover .featured-arrow{opacity:1;transform:translateX(4px);}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:28px;}
.menu-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:14px 16px;cursor:pointer;transition:background 0.2s,border-color 0.2s,box-shadow 0.2s;text-decoration:none;color:inherit;display:block;}
.menu-card:hover{background:#0d2040;border-color:var(--title-color2);box-shadow:0 0 12px rgba(245,200,66,0.1);}
.menu-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.menu-card-title{font-size:14px;font-weight:700;color:var(--title-color);letter-spacing:0.5px;line-height:1.4;}
.menu-card-icon{font-size:20px;opacity:0.6;flex-shrink:0;}
.menu-card-desc{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:10px;}
.menu-tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:2px;letter-spacing:1px;}
.tag-es{background:rgba(0,212,255,0.1);color:var(--accent);border:1px solid rgba(0,212,255,0.3);}
.tag-sb{background:rgba(68,136,255,0.1);color:var(--blue);border:1px solid rgba(68,136,255,0.3);}
.tag-inv{background:rgba(255,171,0,0.1);color:var(--amber);border:1px solid rgba(255,171,0,0.3);}
.tag-mo{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.3);}
.tag-all{background:rgba(255,255,255,0.06);color:#aaa;border:1px solid rgba(255,255,255,0.12);}
.tag-wip{background:rgba(255,68,68,0.1);color:var(--red);border:1px solid rgba(255,68,68,0.3);}
.menu-card-status{font-family:var(--mono);font-size:9px;margin-top:8px;display:flex;align-items:center;gap:5px;}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.s-live{background:var(--green);box-shadow:0 0 4px var(--green);animation:blink2 2s infinite;}
.s-wip{background:var(--amber);}
.s-plan{background:var(--muted);}
@keyframes blink2{0%,100%{opacity:1}50%{opacity:0.4}}
footer{border-top:1px solid var(--border);padding:16px 0;text-align:center;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;}

/* ── 設定ボタン ── */
.settings-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;background:var(--accent);border:none;border-radius:50%;cursor:pointer;font-size:22px;color:#000;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,212,255,0.4);transition:transform 0.2s,box-shadow 0.2s;z-index:500;}
.settings-fab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(0,212,255,0.6);}

/* ── 設定パネル ── */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:flex-start;justify-content:flex-end;}
.settings-overlay.open{display:flex;}
.settings-panel{background:#081428;border-left:1px solid var(--border);width:min(520px,100vw);height:100vh;overflow-y:auto;padding:0;display:flex;flex-direction:column;}
.sp-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);background:#050d1a;position:sticky;top:0;z-index:10;}
.sp-title{font-family:var(--mono);font-size:14px;color:var(--accent);letter-spacing:2px;}
.sp-close{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:18px;width:32px;height:32px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.sp-close:hover{border-color:var(--red);color:var(--red);}
.sp-body{padding:16px 20px;flex:1;}
.sp-section{margin-bottom:24px;}
.sp-section-title{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:2px;border-left:2px solid var(--accent);padding-left:8px;margin-bottom:12px;opacity:0.8;}
.sp-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.sp-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;}
.sp-input{background:#0a1a30;border:1px solid var(--border);border-radius:4px;padding:7px 10px;color:var(--text);font-family:var(--sans);font-size:13px;width:100%;transition:border-color 0.2s;}
.sp-input:focus{outline:none;border-color:var(--accent);}
.sp-input[type=color]{padding:2px 4px;height:36px;cursor:pointer;}
.sp-colors{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sp-color-row{display:flex;flex-direction:column;gap:4px;}

/* メニューカード編集 */
.sp-card-list{display:flex;flex-direction:column;gap:8px;}
.sp-card-item{background:#0a1a30;border:1px solid var(--border);border-radius:6px;padding:10px 12px;}
.sp-card-item-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:0;}
.sp-card-item-title{font-size:12px;color:var(--text);font-weight:500;}
.sp-card-item-body{margin-top:10px;display:none;flex-direction:column;gap:8px;}
.sp-card-item-body.open{display:flex;}
.sp-card-chevron{color:var(--muted);font-size:12px;transition:transform 0.2s;}
.sp-card-chevron.open{transform:rotate(180deg);}
.sp-btn-row{display:flex;gap:8px;}
.sp-btn{font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:6px 14px;border-radius:4px;cursor:pointer;transition:all 0.2s;border:1px solid;}
.sp-btn-del{background:rgba(255,68,68,0.1);border-color:var(--red);color:var(--red);}
.sp-btn-del:hover{background:rgba(255,68,68,0.25);}
.sp-btn-add{background:rgba(0,212,255,0.1);border-color:var(--accent);color:var(--accent);}
.sp-btn-add:hover{background:rgba(0,212,255,0.2);}
.sp-btn-save{background:rgba(0,230,118,0.15);border-color:var(--green);color:var(--green);font-size:12px;padding:8px 20px;}
.sp-btn-save:hover{background:rgba(0,230,118,0.3);}
.sp-btn-dl{background:rgba(68,136,255,0.15);border-color:var(--blue);color:var(--blue);font-size:12px;padding:8px 20px;}
.sp-btn-dl:hover{background:rgba(68,136,255,0.3);}
.sp-footer-btns{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border);background:#050d1a;position:sticky;bottom:0;}
.sp-select{background:#0a1a30;border:1px solid var(--border);border-radius:4px;padding:7px 10px;color:var(--text);font-family:var(--sans);font-size:13px;width:100%;}
.sp-select:focus{outline:none;border-color:var(--accent);}

/* セクション管理 */
.sp-section-list{display:flex;flex-direction:column;gap:12px;}
.sp-section-item{background:#0a1a30;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.sp-section-header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;cursor:pointer;background:#0d1f38;}
.sp-section-name{font-size:12px;color:var(--title-color);font-weight:700;}

@media(max-width:600px){
  .header-inner{flex-direction:column;align-items:flex-start;}
  .clock-date{text-align:left;}
  .featured-card{flex-direction:column;}
  .featured-stats{width:100%;justify-content:space-between;}
  .featured-arrow{display:none;}
  .menu-grid{grid-template-columns:1fr;}
  .settings-panel{width:100vw;}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-inner">
      <div>
        <div class="site-title" id="dispSiteTitle">製造課　ホームページ（サンプル）</div>
        <div class="site-sub"   id="dispSiteSub">A1 LINE　／　製造部　製造課（サンプル）</div>
      </div>
      <div>
        <div class="clock-time" id="clk">--:--:--</div>
        <div class="clock-date" id="clkd">----年--月--日</div>
      </div>
    </div>
  </header>
  <div id="mainContent"></div>
</div>
<footer><div id="dispFooter">製造課　ホームページ（サンプル）　／　A1 LINE　製造部　製造課</div></footer>

<!-- 設定ボタン -->
<button class="settings-fab" onclick="openSettings()" title="設定">⚙</button>

<!-- 設定パネル -->
<div class="settings-overlay" id="settingsOverlay" onclick="overlayClick(event)">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <div class="sp-header">
      <span class="sp-title">⚙　サイト設定</span>
      <button class="sp-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="sp-body">

      <!-- ① 基本情報 -->
      <div class="sp-section">
        <div class="sp-section-title">■ 基本情報</div>
        <div class="sp-row"><div class="sp-label">サイトタイトル</div><input class="sp-input" id="cfgTitle" type="text"></div>
        <div class="sp-row"><div class="sp-label">サブタイトル</div><input class="sp-input" id="cfgSub" type="text"></div>
        <div class="sp-row"><div class="sp-label">フッターテキスト</div><input class="sp-input" id="cfgFooter" type="text"></div>
      </div>

      <!-- ② カラーテーマ -->
      <div class="sp-section">
        <div class="sp-section-title">■ カラーテーマ</div>
        <div class="sp-colors">
          <div class="sp-color-row"><div class="sp-label">背景色</div><input class="sp-input" id="cfgBg" type="color"></div>
          <div class="sp-color-row"><div class="sp-label">パネル色</div><input class="sp-input" id="cfgPanel" type="color"></div>
          <div class="sp-color-row"><div class="sp-label">アクセント色（シアン）</div><input class="sp-input" id="cfgAccent" type="color"></div>
          <div class="sp-color-row"><div class="sp-label">タイトル色（ゴールド）</div><input class="sp-input" id="cfgTitleColor" type="color"></div>
          <div class="sp-color-row"><div class="sp-label">テキスト色</div><input class="sp-input" id="cfgText" type="color"></div>
          <div class="sp-color-row"><div class="sp-label">ミュート色</div><input class="sp-input" id="cfgMuted" type="color"></div>
        </div>
      </div>

      <!-- ③ 特集カード -->
      <div class="sp-section">
        <div class="sp-section-title">■ 特集カード（生産管理）</div>
        <div class="sp-row"><div class="sp-label">バッジテキスト</div><input class="sp-input" id="cfgFBadge" type="text"></div>
        <div class="sp-row"><div class="sp-label">タイトル</div><input class="sp-input" id="cfgFTitle" type="text"></div>
        <div class="sp-row"><div class="sp-label">説明文</div><input class="sp-input" id="cfgFDesc" type="text"></div>
        <div class="sp-row"><div class="sp-label">リンク先URL</div><input class="sp-input" id="cfgFLink" type="text"></div>
      </div>

      <!-- ④ セクション＆メニュー管理 -->
      <div class="sp-section">
        <div class="sp-section-title">■ セクション・メニュー管理</div>
        <div class="sp-section-list" id="sectionList"></div>
        <div style="margin-top:12px;">
          <button class="sp-btn sp-btn-add" onclick="addSection()">＋ セクション追加</button>
        </div>
      </div>

    </div>
    <div class="sp-footer-btns">
      <button class="sp-btn sp-btn-save" onclick="applySettings()">✔　プレビューに反映</button>
      <button class="sp-btn sp-btn-dl"   onclick="downloadHTML()">↓　HTMLを保存</button>
    </div>
  </div>
</div>

<script>
/* ════ データ ════ */
let SITE = {
  title:  '製造課　ホームページ（サンプル）',
  sub:    'A1 LINE　／　製造部　製造課（サンプル）',
  footer: '製造課　ホームページ（サンプル）　／　A1 LINE　製造部　製造課',
  colors: {
    bg:         '#050d1a',
    panel:      '#0a1a30',
    accent:     '#00d4ff',
    titleColor: '#f5c842',
    text:       '#d0e8f8',
    muted:      '#4a6a8a',
  },
  featured: {
    badge: 'LIVE　リアルタイム',
    title: 'A1ライン　生産管理ダッシュボード',
    desc:  '直生産実績・出来高・アンドン・異常ログをリアルタイムで表示／生産指示リスト・前後工程実績・停止時間累計',
    link:  'es10_production_dashboard.html',
  },
  sections: [
    {
      id:'s0', title:'■ 朝礼・現場管理', cards:[
        {title:'朝礼資料', desc:'PDF・Excel・画像ファイルをアップロードして朝礼資料を表示・管理', icon:'📋', link:'morning.html', tags:['ES','全体'], status:'live'},
        {title:'作業者配置図', desc:'工程番号と作業者名の対応表。日勤・夜勤別・日付別に編集・保存可能', icon:'👷', link:'layout.html', tags:['ES'], status:'live'},
      ]
    },
    {
      id:'s1', title:'■ 生産管理', cards:[
        {title:'A1ライン　生産管理ダッシュボード', desc:'直生産実績・アンドン・異常ログをリアルタイム表示', icon:'📊', link:'es10_production_dashboard.html', tags:['ES'], status:'live'},
      ]
    },
    {
      id:'s2', title:'■ 設備保全・自主保全', cards:[
        {title:'設備保全進捗管理システム（自主保全システム）', desc:'設備の自主保全活動の進捗を管理・可視化するシステム', icon:'🔧', link:'#', tags:['ES','全体'], status:'live'},
        {title:'設備管理ロガー', desc:'設備・工程の稼働状態を記録・管理するシステム', icon:'📋', link:'#', tags:['ES'], status:'live'},
        {title:'ライン異常通知システム', desc:'ラインの異常をリアルタイムで検知・通知・記録するシステム', icon:'🔔', link:'#', tags:['ES'], status:'live'},
      ]
    },
    {
      id:'s3', title:'■ 品質・手直しログ', cards:[
        {title:'手直しログ　登録', desc:'手直し発生内容を現場からリアルタイムで登録', icon:'✏️', link:'#', tags:['A1・A2','B2'], status:'live'},
        {title:'手直しログ　見える化', desc:'手直し発生状況をグラフ・集計で分析・見える化', icon:'📊', link:'#', tags:['A1・A2','B2'], status:'live'},
      ]
    },
    {
      id:'s4', title:'■ 生産効率・非直数・非可動', cards:[
        {title:'非直数　見える化', desc:'直接生産に寄与しない作業の発生状況を可視化', icon:'📉', link:'#', tags:['ES'], status:'live'},
        {title:'非可動　見える化', desc:'設備・ラインの停止・非稼働状況を可視化・分析', icon:'⏸️', link:'#', tags:['ES','C3'], status:'live'},
        {title:'日々総合効率　みえる化', desc:'OEE（総合設備効率）を日次で集計・グラフ表示', icon:'📈', link:'#', tags:['ES','全体','C3','B2'], status:'live'},
      ]
    },
    {
      id:'s5', title:'■ 原価生産・ライン管理板', cards:[
        {title:'原価生産ライン管理板・ES　1枚目', desc:'ESラインの原価・生産状況をまとめた管理板（1枚目）', icon:'🗂️', link:'#', tags:['ES'], status:'live'},
        {title:'原価生産ライン管理板・ES　2枚目', desc:'ESラインの原価・生産状況をまとめた管理板（2枚目）', icon:'🗂️', link:'#', tags:['ES'], status:'live'},
        {title:'原価生産ライン管理板　B2（工事中）', desc:'B2ラインの管理板（現在工事中・準備中）', icon:'🚧', link:'#', tags:['B2','工事中'], status:'wip'},
      ]
    },
  ]
};

/* タグ→CSSクラスマッピング */
const TAG_MAP = {
  'ES':'tag-es','A1・A2':'tag-es','SB':'tag-sb','B2':'tag-inv',
  'C3':'tag-mo','全体':'tag-all','使用':'tag-all','工事中':'tag-wip',
};
function tagClass(t){ return TAG_MAP[t]||'tag-all'; }

const STATUS_LABEL = {live:'稼働中', wip:'準備中', plan:'計画中'};
const STATUS_COLOR = {live:'#7a9aaa', wip:'#c8961a', plan:'#4a6a8a'};

/* ════ レンダリング ════ */
function render(){
  /* CSS変数更新 */
  const r = document.documentElement.style;
  r.setProperty('--bg',         SITE.colors.bg);
  r.setProperty('--panel',      SITE.colors.panel);
  r.setProperty('--accent',     SITE.colors.accent);
  r.setProperty('--title-color',SITE.colors.titleColor);
  r.setProperty('--title-color2', adjustColor(SITE.colors.titleColor, -40));
  r.setProperty('--accent2',    adjustColor(SITE.colors.accent, -60));
  r.setProperty('--text',       SITE.colors.text);
  r.setProperty('--muted',      SITE.colors.muted);

  /* ヘッダー */
  document.getElementById('dispSiteTitle').textContent = SITE.title;
  document.getElementById('dispSiteSub').textContent   = SITE.sub;
  document.getElementById('dispFooter').textContent    = SITE.footer;
  document.getElementById('pageTitle').textContent     = SITE.title;

  /* 特集カード */
  const f = SITE.featured;
  let html = `
    <div class="section-title">■ 生産管理（特集）</div>
    <a class="featured-card" href="${f.link}">
      <div class="featured-left">
        <div class="featured-badge">${f.badge}</div>
        <div class="featured-title">${f.title}</div>
        <div class="featured-desc">${f.desc.replace(/\/\n?/g,'<br>')}</div>
      </div>
      <div class="featured-stats">
        <div class="fstat"><div class="fstat-val" id="todayPlanDisp">−</div><div class="fstat-lbl">本日計画台数</div></div>
        <div class="fstat"><div class="fstat-val" style="color:var(--accent)">2</div><div class="fstat-lbl">タブ画面</div></div>
        <div class="fstat"><div class="fstat-val" style="color:var(--amber)">10</div><div class="fstat-lbl">機種対応</div></div>
      </div>
      <div class="featured-arrow">›</div>
    </a>`;

  /* セクション */
  SITE.sections.forEach(sec => {
    html += `<div class="section-title">${sec.title}</div><div class="menu-grid">`;
    sec.cards.forEach(card => {
      const tags = card.tags.map(t=>`<span class="tag ${tagClass(t)}">${t}</span>`).join('');
      html += `
        <a class="menu-card" href="${card.link}">
          <div class="menu-card-header">
            <div class="menu-card-title">${card.title}</div>
            <div class="menu-card-icon">${card.icon}</div>
          </div>
          <div class="menu-card-desc">${card.desc}</div>
          <div class="menu-tags">${tags}</div>
          <div class="menu-card-status">
            <div class="status-dot s-${card.status}"></div>
            <span style="color:${STATUS_COLOR[card.status]||'#7a9aaa'}">${STATUS_LABEL[card.status]||card.status}</span>
          </div>
        </a>`;
    });
    html += `</div>`;
  });

  document.getElementById('mainContent').innerHTML = html;
  calcTodayPlan();
}

/* ════ 設定パネル ════ */
function openSettings(){
  loadSettingsToForm();
  buildSectionList();
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings(){ document.getElementById('settingsOverlay').classList.remove('open'); }
function overlayClick(e){ if(e.target===document.getElementById('settingsOverlay')) closeSettings(); }

function loadSettingsToForm(){
  document.getElementById('cfgTitle').value      = SITE.title;
  document.getElementById('cfgSub').value        = SITE.sub;
  document.getElementById('cfgFooter').value     = SITE.footer;
  document.getElementById('cfgBg').value         = SITE.colors.bg;
  document.getElementById('cfgPanel').value      = SITE.colors.panel;
  document.getElementById('cfgAccent').value     = SITE.colors.accent;

  document.getElementById('cfgText').value       = SITE.colors.text;
  document.getElementById('cfgMuted').value      = SITE.colors.muted;
  document.getElementById('cfgFBadge').value     = SITE.featured.badge;
  document.getElementById('cfgFTitle').value     = SITE.featured.title;
  document.getElementById('cfgFDesc').value      = SITE.featured.desc;
  document.getElementById('cfgFLink').value      = SITE.featured.link;
}

function applySettings(){
  SITE.title  = document.getElementById('cfgTitle').value;
  SITE.sub    = document.getElementById('cfgSub').value;
  SITE.footer = document.getElementById('cfgFooter').value;
  SITE.colors.bg         = document.getElementById('cfgBg').value;
  SITE.colors.panel      = document.getElementById('cfgPanel').value;
  SITE.colors.accent     = document.getElementById('cfgAccent').value;
  SITE.colors.titleColor = document.getElementById('cfgTitleColor').value;
  SITE.colors.text       = document.getElementById('cfgText').value;
  SITE.colors.muted      = document.getElementById('cfgMuted').value;
  SITE.featured.badge = document.getElementById('cfgFBadge').value;
  SITE.featured.title = document.getElementById('cfgFTitle').value;
  SITE.featured.desc  = document.getElementById('cfgFDesc').value;

/* ── セクションリスト構築 ── */
function buildSectionList(){
  const el = document.getElementById('sectionList');
  el.innerHTML = SITE.sections.map((sec,si) => `
    <div class="sp-section-item" id="secItem${si}">
      <div class="sp-section-header" onclick="toggleSecBody(${si})">
        <span class="sp-section-name">${sec.title}</span>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="sp-btn sp-btn-add" style="padding:2px 8px;font-size:9px;" onclick="event.stopPropagation();addCard(${si})">＋カード</button>
          <button class="sp-btn sp-btn-del" style="padding:2px 8px;font-size:9px;" onclick="event.stopPropagation();deleteSection(${si})">削除</button>
          <span class="sp-card-chevron" id="chev${si}">▼</span>
        </div>
      </div>
      <div style="padding:0 10px 0;display:none;" id="secBody${si}">
        <div style="margin:8px 0 4px;">
          <div class="sp-label" style="margin-bottom:4px;">セクションタイトル</div>
          <input class="sp-input" value="${sec.title}" onchange="SITE.sections[${si}].title=this.value">
        </div>
        ${sec.cards.map((card,ci)=>`
        <div style="background:#061220;border:1px solid var(--border);border-radius:4px;padding:8px 10px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:11px;color:var(--title-color);">${card.icon} ${card.title.substring(0,20)}...</span>
            <button class="sp-btn sp-btn-del" style="padding:2px 8px;font-size:9px;" onclick="deleteCard(${si},${ci})">削除</button>
          </div>
          <div class="sp-row"><div class="sp-label">タイトル</div><input class="sp-input" value="${card.title}" onchange="SITE.sections[${si}].cards[${ci}].title=this.value"></div>
          <div class="sp-row"><div class="sp-label">説明</div><input class="sp-input" value="${card.desc}" onchange="SITE.sections[${si}].cards[${ci}].desc=this.value"></div>
          <div class="sp-row"><div class="sp-label">アイコン（絵文字）</div><input class="sp-input" style="width:80px;" value="${card.icon}" onchange="SITE.sections[${si}].cards[${ci}].icon=this.value"></div>
          <div class="sp-row"><div class="sp-label">リンク先URL</div><input class="sp-input" value="${card.link}" onchange="SITE.sections[${si}].cards[${ci}].link=this.value"></div>
          <div class="sp-row"><div class="sp-label">タグ（カンマ区切り）</div><input class="sp-input" value="${card.tags.join(',')}" onchange="SITE.sections[${si}].cards[${ci}].tags=this.value.split(',').map(t=>t.trim()).filter(Boolean)"></div>
          <div class="sp-row"><div class="sp-label">状態</div>
            <select class="sp-select" onchange="SITE.sections[${si}].cards[${ci}].status=this.value">
              <option value="live" ${card.status==='live'?'selected':''}>稼働中</option>
              <option value="wip"  ${card.status==='wip' ?'selected':''}>準備中</option>
              <option value="plan" ${card.status==='plan'?'selected':''}>計画中</option>
            </select>
          </div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

function toggleSecBody(si){
  const body = document.getElementById('secBody'+si);
  const chev = document.getElementById('chev'+si);
  const open = body.style.display === 'none' || body.style.display === '';
  body.style.display = open ? 'block' : 'none';
  chev.textContent = open ? '▲' : '▼';
}

function addSection(){
  const id = 's'+ Date.now();
  SITE.sections.push({ id, title:'■ 新しいセクション', cards:[] });
  buildSectionList();
}
function deleteSection(si){
  if(!confirm('このセクションを削除しますか？')) return;
  SITE.sections.splice(si,1);
  buildSectionList();
}
function addCard(si){
  SITE.sections[si].cards.push({title:'新しいメニュー',desc:'説明を入力してください',icon:'📌',link:'#',tags:['ES'],status:'plan'});
  buildSectionList();
  /* 対象セクションを開く */
  const body = document.getElementById('secBody'+si);
  if(body) body.style.display = 'block';
}
function deleteCard(si,ci){
  if(!confirm('このカードを削除しますか？')) return;
  SITE.sections[si].cards.splice(ci,1);
  buildSectionList();
}

/* ════ HTMLダウンロード ════ */
function downloadHTML(){
  applySettings();
  const html = document.documentElement.outerHTML
    .replace('</body>', `<script>var SITE_DATA=${JSON.stringify(SITE)};<\/script></body>`);
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
}

/* ════ ユーティリティ ════ */
function adjustColor(hex, amount){
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+amount));
  g=Math.max(0,Math.min(255,g+amount));
  b=Math.max(0,Math.min(255,b+amount));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

/* ════ 時計 ════ */
function updateClock(){
  const now=new Date();
  document.getElementById('clk').textContent=now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const d=now.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});
  const p=d.split('/');
  document.getElementById('clkd').textContent=p.length===3?`${p[0]}年${p[1]}月${p[2]}日`:d;
}
setInterval(updateClock,1000);
updateClock();
